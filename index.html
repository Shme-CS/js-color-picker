<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker Tool</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Color Picker Tool</h1>
        <p class="description">Pick and explore colors with ease</p>

        <!-- Color Preview Section -->
        <div class="color-preview-section">
            <div class="color-preview" id="colorPreview">
                <span class="preview-label">Preview</span>
            </div>
        </div>

        <!-- Color Picker Input -->
        <div class="picker-section">
            <label for="colorPicker" class="picker-label">Choose a Color</label>
            <input type="color" id="colorPicker" class="color-input" value="#667eea">
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn btn-random" id="randomBtn">
                    <span class="btn-icon">🎲</span>
                    Random Color
                </button>
                <button class="btn btn-save" id="saveBtn">
                    <span class="btn-icon">💾</span>
                    Save to Palette
                </button>
            </div>
        </div>

        <!-- Color Display Section -->
        <div class="color-display-section">
            <div class="color-code-container">
                <label class="code-label">HEX Color Code</label>
                <div class="code-display">
                    <input type="text" id="hexValue" class="hex-input" value="#667eea" readonly>
                    <button class="copy-btn" id="copyBtn">
                        <span class="btn-icon">📋</span>
                        Copy
                    </button>
                </div>
            </div>

            <!-- RGB Display -->
            <div class="color-code-container">
                <label class="code-label">RGB Color Code</label>
                <div class="code-display">
                    <input type="text" id="rgbValue" class="hex-input" value="rgb(102, 126, 234)" readonly>
                </div>
            </div>

            <!-- HSL Display -->
            <div class="color-code-container">
                <label class="code-label">HSL Color Code</label>
                <div class="code-display">
                    <input type="text" id="hslValue" class="hex-input" value="hsl(229, 76%, 66%)" readonly>
                </div>
            </div>
        </div>

        <!-- Saved Palette Section -->
        <div class="palette-section">
            <div class="palette-header">
                <h2>Saved Palette</h2>
                <button class="btn btn-clear" id="clearPaletteBtn">
                    <span class="btn-icon">🗑️</span>
                    Clear All
                </button>
            </div>
            <div class="palette-grid" id="paletteGrid">
                <p class="no-colors">No colors saved yet. Click "Save to Palette" to add colors!</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
